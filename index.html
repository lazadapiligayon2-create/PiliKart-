<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PiliKart</title>

<!-- PWA META -->
<meta name="theme-color" content="#4facfe">
<link rel="manifest" href="manifest.json">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#eef4ff;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  background:white;
  position:sticky;
  top:0;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

/* MENU */
.menu{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  padding:10px;
}

.menu div{
  background:white;
  padding:10px;
  border-radius:10px;
  text-align:center;
  font-size:12px;
  cursor:pointer;
}

/* CARD */
.card{
  background:white;
  margin:10px;
  padding:10px;
  border-radius:10px;
}

/* BOTTOM NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:white;
  padding:10px 0;
}
</style>
</head>

<body>

<div class="header">
  <div>☰</div>
  <div><b>PiliKart</b></div>
  <div>🛒</div>
</div>

<div class="menu">
  <div onclick="go('home')">Home</div>
  <div onclick="go('piso')">Piso</div>
  <div onclick="go('rewards')">Rewards</div>
  <div onclick="go('bible')">Bible</div>
</div>

<div id="content">

<div id="home">
  <div class="card">
    <h3>🔥 Sample Product</h3>
    <p>₱99</p>
  </div>
</div>

<div id="piso" style="display:none;">
  <div class="card">🎁 Piso Deals Locked</div>
</div>

<div id="rewards" style="display:none;">
  <div class="card">💰 Rewards Coming Soon</div>
</div>

<div id="bible" style="display:none;">
  <div class="card">📖 Verse of the Day</div>
</div>

</div>

<div class="nav">
  <div onclick="go('home')">Home</div>
  <div onclick="go('piso')">Piso</div>
  <div onclick="go('rewards')">Rewards</div>
  <div onclick="go('bible')">Bible</div>
</div>

<script>
function go(page){
  let pages = ["home","piso","rewards","bible"];

  pages.forEach(p=>{
    document.getElementById(p).style.display="none";
  });

  document.getElementById(page).style.display="block";
}
</script>

</body>
</html>
